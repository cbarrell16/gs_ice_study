name: gs_ice_study
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10.12
  - numpy
  - pandas
  - xarray
  - netcdf4
  - scipy
  - matplotlib
  - cartopy
  - cmocean
  - shapely
  - regionmask
  - pyyaml
  - jupyter
  - jupyterlab
  - notebook
  - pip
  - pip:
    - gsw           # TEOS-10 thermodynamic calculations
    - pymannkendall # Mann-Kendall trend tests
    - pwlf          # Piecewise linear fitting
    - argopy        # Argo float data access
    - rockhound     # ETOPO1 bathymetry fetching
    - pyts          # Time series analysis utilities
